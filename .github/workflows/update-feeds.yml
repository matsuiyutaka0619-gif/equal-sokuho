name: Update RSS feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "18 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update feeds
        run: node scripts/update-feeds.mjs

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update RSS feed data"
          file_pattern: data/articles.json data/last-fetch-report.json
